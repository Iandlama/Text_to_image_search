# models.yaml
# ===========
# Декларативные пресеты моделей для meme_embeddings.
# Каждый пресет собирается в EmbedderConfig через config.py:load_presets_from_yaml().
#
# trust_remote_code указывается ЯВНО для каждой модели - модели с кастомным кодом
# на HF Hub (jina-clip-v2, bge-m3 с некоторыми ревизиями и т.п.) требуют true,
# стандартные модели transformers/sentence-transformers - false.
#
# revision - опционально, пин на конкретный commit/tag модели на HF Hub.
# Рекомендуется фиксировать после первого успешного запуска в проде (воспроизводимость).

presets:

  jina-clip-v2:
    embedder_type: clip
    model:
      name: jina-clip-v2
      hf_id: jinaai/jina-clip-v2
      native_dim: 1024
      max_length: 77
      device: cpu
      dtype: float32
      trust_remote_code: true
      revision: null           # зафиксируйте конкретный commit после проверки совместимости
    projection:
      enabled: true
      target_dim: 512
      method: truncate
    model_version: "jina-clip-v2@1"
    preprocessing_version: "v1"

  multilingual-e5-large:
    embedder_type: text
    model:
      name: multilingual-e5-large
      hf_id: intfloat/multilingual-e5-large
      native_dim: 1024
      max_length: 512
      device: cpu
      dtype: float32
      trust_remote_code: false
      query_prefix: "query: "
      passage_prefix: "passage: "
    projection:
      enabled: true
      target_dim: 512
      method: truncate
    model_version: "me5-large@1"
    preprocessing_version: "v1"

  bge-m3:
    embedder_type: text
    model:
      name: bge-m3
      hf_id: BAAI/bge-m3
      native_dim: 1024
      max_length: 512
      device: cpu
      dtype: float32
      trust_remote_code: false
    projection:
      enabled: true
      target_dim: 256
      method: truncate
    model_version: "bge-m3@1"
    preprocessing_version: "v1"

  gemma-caption+e5:
    embedder_type: multimodal
    model:
      name: multilingual-e5-large
      hf_id: intfloat/multilingual-e5-large
      native_dim: 1024
      max_length: 512
      device: cpu
      dtype: float32
      trust_remote_code: false
      query_prefix: "query: "
      passage_prefix: "passage: "
    caption_model:
      name: gemma-3-4b-it
      hf_id: google/gemma-3-4b-it
      native_dim: 0
      device: cpu
      dtype: bfloat16
      trust_remote_code: false
    projection:
      enabled: true
      target_dim: 512
      method: truncate
    caption_max_new_tokens: 200
    caption_temperature: 0.0
    model_version: "gemma3-4b-it+me5-large@1"
    preprocessing_version: "v1"
